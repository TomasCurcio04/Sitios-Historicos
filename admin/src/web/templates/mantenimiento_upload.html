{% extends "layout.html" %}

{% block content %}
<div class="container">
    <h2>Subir Nueva Imagen para Sitio Histórico</h2>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('mantenimiento_admin.upload_image') }}" enctype="multipart/form-data">
        
        <div class="form-group">
            <label for="sitio_id">Sitio Histórico</label>
            <select name="sitio_id" id="sitio_id" class="form-control" required>
                <option value="">Selecciona un sitio...</option>
                {% for site in sites %}
                    <option value="{{ site.id_site }}">{{ site.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="imagen">Archivo de Imagen</label>
            <input type="file" name="imagen" id="imagen" class="form-control" accept="image/*" required>
        </div>

        <div class="form-group">
            <label for="titulo">Título (Alt-text)</label>
            <input type="text" name="titulo" id="titulo" class="form-control">
        </div>

        <div class="form-group">
            <label for="descripcion">Descripción</label>
            <textarea name="descripcion" id="descripcion" class="form-control" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label for="orden">Orden</label>
            <input type="number" name="orden" id="orden" class="form-control" value="0">
        </div>

        <div class="form-check">
            <input type="checkbox" name="es_portada" id="es_portada" class="form-check-input" value="true">
            <label class="form-check-label" for="es_portada">Marcar como portada</label>
        </div>
        
        <br>
        <button type="submit" class="btn btn-primary">Subir Imagen</button>
    </form>
</div>
{% endblock %}
