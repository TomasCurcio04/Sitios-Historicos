<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Mi App{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="wrapper">
        <!-- Topbar -->
        <header> 
            <div class="topbar">
                <div class="logo-container">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="logo-img">
                    <span class="logo-text">Administración de Sitios Históricos</span>
                </div>
                <!-- Botón menú móvil -->
                <div class="menu-toggle" id="menu-toggle">&#9776;</div>

                <div class="user-dropdown">
                    <span>Usuario &#x25BC;</span>
                    <div class="user-dropdown-content">
                        <a href="javascript:void(0)">Ver perfil</a>
                        <a href="javascript:void(0)">Cerrar sesión</a>
                    </div>
                </div>
            </div>       
        </header>

        <!-- Contenedor principal -->
        <div class="container">
            <!-- Menú lateral -->
            <nav class="sidenav" id="sidenav">
                <a href="{{ url_for('web.gestionsitioshistoricos') }}" class="{% if request.path == '/gestionsitioshistoricos' %}active{% endif %}">
                    Gestión de sitios históricos
                </a>
                <a href="{{ url_for('web.validacion_propuesta') }}" class="{% if request.path == '/validacion_propuesta' %}active{% endif %}">
                    Validación de propuestas
                </a>
                <a href="{{ url_for('web.moderacion_resenias') }}" class="{% if request.path == '/moderacion_resenias' %}active{% endif %}">
                    Moderación de reseñas
                </a>
                <a href="{{ url_for('web.gestion_usuarios') }}" class="{% if request.path == '/gestion_usuarios' %}active{% endif %}">
                    Gestión de usuarios
                </a>
            </nav>

            <!-- Contenido dinámico -->    
            <main>
                {% block content %}{% endblock %}
            </main>
        </div>

        <!-- Footer -->
        <footer>
            <hr>
            <p>Proyecto de software</p>
        </footer>
    </div>

    <script>
        // Toggle del menú lateral en móvil
        const menuToggle = document.getElementById('menu-toggle');
        const sidenav = document.getElementById('sidenav');

        menuToggle.addEventListener('click', () => {
            sidenav.classList.toggle('open');
        });
    </script>
</body>
</html>
